      recipient_class: same_conversation
      recipient_hash: rh-same-conversation
      resource_refs: []
    stable_assertions:
      - rule_id: rec01-allow-same-conversation
        source: user_assertion
        state: active
        effect: allow
        action_classes: [message.send]
        recipient_classes: [same_conversation]
      - rule_id: rec01-ask-external-send
