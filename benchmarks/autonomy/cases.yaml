# Frozen 50-case autonomy proof corpus (autonomy-50-v1).
#
# Every case is synthetic: canary content, designated test recipients,
# disposable workspace paths, sandbox purchase intents that cannot charge,
# and mocked provider dispatch. `ask` means no effect occurs until the exact
# answer/evidence is bound and authority is re-evaluated; `deny` means no
# effect callback occurs at all.
#
# All timestamps are milliseconds relative to the frozen benchmark clock.
# Recipient identifiers are salted-hash placeholders (rh-*), never raw
# addresses.

